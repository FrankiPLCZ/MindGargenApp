workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get Flutter packages
        script: |
          cd mind_garden
          flutter pub get

      - name: Build IPA
        script: |
          cd mind_garden
          flutter build ipa --release

    artifacts:
      - mind_garden/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true