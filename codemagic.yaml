workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.franki.mindgarden

    scripts:
      - name: Get Flutter packages
        script: |
          cd mind_garden
          flutter pub get

      - name: Build IPA
        script: |
          cd mind_garden
          flutter build ipa --release

    artifacts:
      - mind_garden/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        submit_to_testflight: true